<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#080808" />
<title>DON LOW — World Wide Reach</title>
<meta name="description" content="DON LOW — 40K monthly Spotify listeners. 169 countries. Receipts." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Teko:wght@700&family=Caveat:wght@700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/worldwide.css" />
</head>
<body class="body--dark">

  <div class="bg-overlay bg-overlay--solid"></div>

  <main class="frame frame--scroll frame--dark" id="frame">

    <div class="sig-bar sig-bar--top"></div>

    <nav class="nav nav--visible">
      <a class="nav__logo" href="/">DON LOW</a>
      <ul class="nav__links">
        <li><a href="/worldwide" class="nav__active">Reach</a></li>
      </ul>
    </nav>

    <div class="reach-content">

      <!-- ============ HERO ============ -->
      <section class="reach-hero">
        <video class="reach-hero__video" autoplay muted loop playsinline preload="auto">
          <source src="/assets/worldwide/bg-video.mp4" type="video/mp4" />
        </video>
        <div class="reach-hero__dim"></div>

        <div class="reach-hero__content">
          <div class="reach-hero__tag">— Selected Numbers & Paperwork</div>
          <h1 class="reach-hero__title">World<br>Wide<br>Reach.</h1>
          <p class="reach-hero__signature">— Don Low</p>
        </div>
      </section>

      <!-- ============ PROOF — Spotify stats ============ -->
      <section class="proof">
        <img class="proof__bg" src="/assets/worldwide/outdoor-gym.png" alt="" />
        <div class="proof__content">
          <h3 class="proof__platform">Spotify.</h3>
          <div class="counters" id="counters">
            <div class="counter">
              <span class="counter__value" data-target="40000" data-suffix="K" data-divide="1000">0</span>
              <span class="counter__label">Monthly<br>Listeners</span>
            </div>
            <div class="counter">
              <span class="counter__value" data-target="1200000" data-suffix="M" data-divide="1000000" data-decimals="1">0</span>
              <span class="counter__label">Listeners</span>
            </div>
            <div class="counter">
              <span class="counter__value" data-target="2500000" data-suffix="M" data-divide="1000000" data-decimals="1">0</span>
              <span class="counter__label">Streams</span>
            </div>
            <div class="counter">
              <span class="counter__value" data-target="1800000" data-suffix="M" data-divide="1000000" data-decimals="1">0</span>
              <span class="counter__label">Hours<br>Played</span>
            </div>
            <div class="counter">
              <span class="counter__value" data-target="169" data-suffix="" data-divide="1">0</span>
              <span class="counter__label">Countries</span>
            </div>
            <div class="counter">
              <span class="counter__value" data-target="195" data-suffix="" data-divide="1" data-prefix="#1 for ">#1 for 0</span>
              <span class="counter__label">Fans</span>
            </div>
          </div>
        </div>
      </section>


      <!-- ============ FOOTER ============ -->
      <footer class="reach-footer">
        <a href="https://open.spotify.com/intl-fr/artist/2fBDf4ES1SWLbeH4GuiOVz" target="_blank" rel="noopener">Spotify</a>
        <span>·</span>
        <a href="https://soundcloud.com/iamdonlow" target="_blank" rel="noopener">SoundCloud</a>
        <span>·</span>
        <a href="https://donrecords.fr" target="_blank" rel="noopener">DON. Records</a>
      </footer>

    </div>

    <div class="sig-bar sig-bar--bottom"></div>

  </main>

  <script src="/js/worldwide.js"></script>
</body>
</html>
