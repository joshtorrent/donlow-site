<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#080808" />
<title>DON LOW — Contact</title>
<meta name="description" content="DON LOW — Booking, management, press inquiries." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700&family=Teko:wght@700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/css/style.css" />
<link rel="stylesheet" href="/css/pages.css" />
</head>
<body class="body--dark">

  <div class="bg-overlay bg-overlay--solid"></div>

  <main class="frame frame--scroll frame--dark" id="frame">
    <div class="sig-bar sig-bar--top"></div>

    <nav class="nav nav--visible">
      <a class="nav__logo" href="/">DON LOW</a>
      <ul class="nav__links">
        <li><a href="/music">Music</a></li>
        <li><a href="/shows">Shows</a></li>
        <li><a href="/press">Press</a></li>
        <li><a href="/contact" class="nav__active">Contact</a></li>
      </ul>
    </nav>

    <div class="page-content">

      <!-- Background image -->
      <div class="contact-bg">
        <img src="/assets/photos/contact-bg.jpg" alt="" />
      </div>

      <!-- Contact content centered -->
      <section class="contact-center">
        <img src="/assets/photos/mask-cutout.png" alt="DON LOW" class="contact-mask" />

        <h1 class="page-title page-title--gold">Get in Touch</h1>

        <div class="contact-block">
          <h2 class="contact-label">Booking & Management</h2>
          <a href="mailto:contact@donrecords.fr" class="contact-email">contact@donrecords.fr</a>
        </div>

        <div class="contact-block">
          <h2 class="contact-label">WhatsApp</h2>
          <a href="https://wa.me/33603135654" target="_blank" rel="noopener" class="contact-email">+33 6 03 13 56 54</a>
        </div>

        <div class="contact-block">
          <h2 class="contact-label">Label</h2>
          <a href="https://donrecords.fr" target="_blank" rel="noopener" class="contact-email">DON. Records</a>
        </div>

        <!-- Social icons -->
        <div class="social-row">
          <a href="https://www.instagram.com/iamdonlow/" target="_blank" rel="noopener" title="Instagram">
            <img src="/assets/photos/logo-insta.png" alt="Instagram" />
          </a>
          <a href="https://open.spotify.com/intl-fr/artist/2fBDf4ES1SWLbeH4GuiOVz" target="_blank" rel="noopener" title="Spotify">
            <img src="/assets/photos/logo-spotify.png" alt="Spotify" />
          </a>
          <a href="https://soundcloud.com/iamdonlow" target="_blank" rel="noopener" title="SoundCloud">
            <img src="/assets/photos/logo-soundcloud.png" alt="SoundCloud" />
          </a>
          <a href="https://www.youtube.com/@DONRECORDS" target="_blank" rel="noopener" title="YouTube">
            <img src="/assets/photos/logo-youtube.png" alt="YouTube" />
          </a>
          <a href="https://www.tiktok.com/@iamdonlow" target="_blank" rel="noopener" title="TikTok">
            <img src="/assets/photos/logo-tiktok.png" alt="TikTok" />
          </a>
        </div>

        <p class="contact-availability">Available worldwide for DJ sets, festivals, club nights and private events.</p>
      </section>

      <!-- Footer -->
      <footer class="page-footer page-footer--dark">
        <span>DON LOW &copy; 2025</span>
        <a href="https://donrecords.fr" target="_blank" rel="noopener">DON. Records</a>
      </footer>

    </div>

    <div class="sig-bar sig-bar--bottom"></div>
  </main>

</body>
</html>
