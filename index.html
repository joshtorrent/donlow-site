<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#E8E0D0" />
<title>DON LOW</title>
<meta name="description" content="DON LOW — DJ / Producer. Presskit officiel." />

<!-- Social preview -->
<meta property="og:title" content="DON LOW" />
<meta property="og:description" content="DJ / Producer — Presskit officiel." />
<meta property="og:type" content="website" />
<meta property="og:image" content="/assets/og-preview.jpg" />

<!-- Google Fonts: Teko + Barlow Condensed -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Teko:wght@700&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- === BACKGROUND VIDEO (desktop only, outside of frame) === -->
  <video class="bg-video" autoplay muted loop playsinline poster="/assets/bg-video-poster.jpg">
    <source src="/assets/bg-video.mp4" type="video/mp4" />
  </video>
  <div class="bg-overlay"></div>

  <!-- === LOADER === -->
  <div class="loader" id="loader">
    <div class="loader__text">DON LOW</div>
  </div>

  <!-- === MAIN FRAME (1125:2436) === -->
  <main class="frame" id="frame">

    <!-- Top green signature bar -->
    <div class="sig-bar sig-bar--top"></div>

    <!-- Nav -->
    <nav class="nav">
      <a class="nav__logo" href="/">DON LOW</a>
      <ul class="nav__links">
        <li><a href="/music.html">Music</a></li>
        <li><a href="/shows.html">Shows</a></li>
        <li><a href="/press.html">Press</a></li>
        <li><a href="/contact.html">Contact</a></li>
      </ul>
    </nav>

    <!-- === LAYERS (10 → 1, DOM order = back → front) === -->
    <div class="layers" id="layers">
      <img class="layer" data-layer="10" data-parallax="0.2" src="/assets/10-carre-noir.png"   alt="" />
      <img class="layer" data-layer="9"  data-parallax="0.3" src="/assets/09-carre-rouge.png"  alt="" />
      <img class="layer" data-layer="8"  data-parallax="0.4" src="/assets/08-wttj-black.png"   alt="" />
      <img class="layer" data-layer="7"  data-parallax="0.5" src="/assets/07-wttj-red.png"     alt="" />

      <!-- Layer 6 : masque vidéo (play once, stop on last frame) -->
      <img class="layer" data-layer="6"  data-parallax="0.6" src="/assets/06-masque.png"       alt="" id="layer-mask-img" />
      <video class="layer layer--video" data-layer="6" data-parallax="0.6"
             muted playsinline preload="auto" id="layer-mask-video" style="display:none;">
        <source src="/assets/masque-video.mp4" type="video/mp4" />
      </video>

      <img class="layer" data-layer="5"  data-parallax="0.7" src="/assets/05-donlow.png"       alt="DON LOW" />
      <img class="layer" data-layer="4"  data-parallax="0.8" src="/assets/04-bailepunk.png"    alt="" />
      <img class="layer" data-layer="3"  data-parallax="0.9" src="/assets/03-feuilles.png"     alt="" />
      <img class="layer" data-layer="2"  data-parallax="1.1" src="/assets/02-eclair.png"       alt="" />
      <img class="layer" data-layer="1"  data-parallax="1.3" src="/assets/01-chain.png"        alt="" />
    </div>

    <!-- Stats bottom-left -->
    <div class="stats">
      <span class="stats__item"><b>295K</b> Listeners</span>
      <span class="stats__sep">·</span>
      <span class="stats__item"><b>1.2M</b> Streams</span>
      <span class="stats__sep">·</span>
      <span class="stats__item"><b>169</b> Countries</span>
    </div>

    <!-- Scroll hint bottom-right (red, vertical) -->
    <div class="scroll-hint">SCROLL</div>

    <!-- Bottom red signature bar -->
    <div class="sig-bar sig-bar--bottom"></div>

  </main>

  <script src="/js/parallax.js" defer></script>
</body>
</html>
